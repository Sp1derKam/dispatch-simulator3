<!DOCTYPE html>
<html>
<head>
  <title>Dispatch CAD Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>CAD Dispatch System</h1>

<div class="container">

  <!-- CALLS -->
  <div class="panel" id="callsPanel">
    <h2>Active Calls</h2>
    <div class="controls">
      <button id="generateBtn">Generate Call</button>
      <button id="clearBtn">Clear All</button>
    </div>
    <div id="callList"></div>
  </div>

  <!-- DISPATCH BOARD -->
  <div class="panel" id="dispatchBoard">
    <h2>Dispatch Board</h2>
    <div id="activeCall">No active selection</div>
    <div id="boardNote">Drag a unit onto a call card to dispatch it.</div>
  </div>

  <!-- UNITS -->
  <div class="panel" id="unitsPanel">
    <h2>Units</h2>
    <div id="unitList"></div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
